apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: parktrack-dev

resources:
  - ../../base

images:
  - name: ghcr.io/parktrack-project/api-server-app
    newTag: development
  - name: ghcr.io/parktrack-project/api-server-migrate
    newTag: development
  - name: ghcr.io/parktrack-project/car-detector
    newTag: development
  - name: ghcr.io/parktrack-project/web-map
    newTag: development
  - name: ghcr.io/parktrack-project/admin-panel
    newTag: development

replicas:
  - name: api-server
    count: 1
  - name: web-map
    count: 1
  - name: admin-panel
    count: 1

patches:
  - path: ./http-routes.patches.yaml
    target:
      kind: HTTPRoute
