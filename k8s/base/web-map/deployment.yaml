apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-map
  namespace: parktrack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-map
  template:
    metadata:
      labels:
        app: web-map
    spec:
      containers:
      - name: web-map
        image: ghcr.io/parktrack-project/web-map:latest # {"$imagepolicy": "flux-system:web-map"}
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      imagePullSecrets:
      - name: ghcr-credentials