apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: parktrack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      initContainers:
      - name: api-server-migrate
        image: ghcr.io/parktrack-project/api-server-migrate:latest
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
        - name: POSTGRES_DB
          value: "parktrack"
        - name: POSTGRES_TEST_DB
          value: "test_db"
        volumeMounts:
        - name: migrations
          mountPath: /app/migrations
        - name: scripts
          mountPath: /app/scripts
      containers:
      - name: api-server-app
        image: ghcr.io/parktrack-project/api-server-app:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: api-server-secret
              key: db-url
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "8000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
#        readinessProbe:
#          httpGet:
#            path: /ready
#            port: 8000
#          initialDelaySeconds: 5
#          periodSeconds: 5
      imagePullSecrets:
      - name: ghcr-credentials