apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: parktrack-ingress
  namespace: parktrack
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: api.parktrack.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-server
            port:
              number: 8000
  - host: parktrack.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-map
            port:
              number: 80
  - host: admin.parktrack.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: admin-panel
            port:
              number: 80