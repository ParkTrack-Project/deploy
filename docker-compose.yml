services:
  db:
    image: postgres:15
    restart: always
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 1m
      retries: 5
      start_period: 30s

  api-server-database-migrate:
    image: ghcr.io/parktrack-project/api-server-migrate:latest
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    restart: no

  api-server:
    image: ghcr.io/parktrack-project/api-server-app:latest
    restart: always
    depends_on:
      api-server-database-migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - API_TOKEN=dev_token
    ports:
      - "8000:8000"

#  car-detector:
#    image: ghcr.io/parktrack-project/car-detector:latest
#    restart: always
#    depends_on:
#      - api-server
#    environment:
#      - API_URL=http://api-server:8000
#      - API_TOKEN=dev_token
#    # If using GPU, uncomment below:
#    # deploy:
#    #   resources:
#    #     reservations:
#    #       devices:
#    #         - driver: nvidia
#    #           count: 1
#    #           capabilities: [gpu]

  web-map:
    image: ghcr.io/parktrack-project/web-map:latest
    restart: always
    depends_on:
      - api-server
    ports:
      - "13000:80"

  admin-panel:
    image: ghcr.io/parktrack-project/admin-panel:latest
    restart: always
    depends_on:
      - api-server
    ports:
      - "13001:80"

volumes:
  db_data:
