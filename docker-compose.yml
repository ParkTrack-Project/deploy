services:
  db:
    image: postgres:15
    restart: always
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 1m
      retries: 5
      start_period: 30s

  api-server-database-migrate:
    image: ghcr.io/parktrack-project/api-server-migrate:${TAG:-latest}
    pull_policy: every_30s
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    restart: no

  api-server:
    image: ghcr.io/parktrack-project/api-server-app:${TAG:-latest}
    pull_policy: every_30s
    restart: always
    depends_on:
      api-server-database-migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - API_TOKEN=dev_token
    ports:
      - "${API_SERVER_PORT:-8000}:8000"

#  car-detector:
#    image: ghcr.io/parktrack-project/car-detector:${TAG:-latest}
#    restart: always
#    depends_on:
#      - api-server
#    environment:
#      - API_URL=http://api-server:8000
#      - API_TOKEN=dev_token
#    # If using GPU, uncomment below:
#    # deploy:
#    #   resources:
#    #     reservations:
#    #       devices:
#    #         - driver: nvidia
#    #           count: 1
#    #           capabilities: [gpu]

  web-map:
    image: ghcr.io/parktrack-project/web-map:${TAG:-latest}
    pull_policy: every_30s
    restart: always
    depends_on:
      - api-server
    env_file:
      - .env
    ports:
      - "${WEB_MAP_PORT:-13000}:80"

  admin-panel:
    image: ghcr.io/parktrack-project/admin-panel:${TAG:-latest}
    pull_policy: every_30s
    restart: always
    depends_on:
      - api-server
    env_file:
      - .env
    ports:
      - "${ADMIN_PANEL_PORT:-13001}:80"

volumes:
  db_data:
